version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: makerere-sports-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: sports_management_db
      MYSQL_USER: sports_user
      MYSQL_PASSWORD: sports_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./database/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql
    command: --default-authentication-plugin=mysql_native_password

  redis:
    image: redis:7-alpine
    container_name: makerere-sports-redis
    restart: unless-stopped
    ports:
      - "6379:6379"

  api:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: makerere-sports-api
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 5000
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: sports_management_db
      DB_USER: sports_user
      DB_PASSWORD: sports_password
      JWT_SECRET: your_production_jwt_secret_key_change_this
      JWT_REFRESH_SECRET: your_production_refresh_secret_change_this
      REDIS_URL: redis://redis:6379
    ports:
      - "5000:5000"
    depends_on:
      - db
      - redis
    volumes:
      - ./server/uploads:/app/uploads

  nginx:
    image: nginx:alpine
    container_name: makerere-sports-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
      - ./client/dist:/var/www/html
      - ./server/uploads:/var/www/uploads
      - ./ssl:/etc/nginx/ssl
    depends_on:
      - api

volumes:
  mysql_data:
