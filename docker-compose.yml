version: '3.8'

services:
  db:
    image: postgres:alpine
    container_name: makerere-sports-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
      POSTGRES_DB: sports_management_db
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: makerere-sports-redis
    restart: unless-stopped
    ports:
      - "6379:6379"

  api:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: makerere-sports-api
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 5000
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: sports_management_db
      DB_USER: postgres
      DB_PASSWORD: postgrespassword
      JWT_SECRET: your_production_jwt_secret_key_change_this
      JWT_REFRESH_SECRET: your_production_refresh_secret_change_this
      REDIS_URL: redis://redis:6379
    ports:
      - "5000:5000"
    depends_on:
      - db
      - redis
    volumes:
      - ./server/uploads:/app/uploads

  nginx:
    image: nginx:alpine
    container_name: makerere-sports-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
      - ./client/dist:/var/www/html
      - ./server/uploads:/var/www/uploads
      - ./ssl:/etc/nginx/ssl
    depends_on:
      - api

volumes:
  pg_data:
